<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightLM - Research Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .gemini-fab, [class*="fab"], [class*="floating"] { display: none !important; }
        :root {
            --bg-main: #0f1117; --bg-side: #1a1d27; --bg-head: #13161f;
            --accent: #B31B1B; --text: #e2e8f0; --text-sec: #8892a4;
            --border: #2d3148; --bubble-ai: #1e2235; --input-bg: #252837;
        }
        .light {
            --bg-main: #f8f9fa; --bg-side: #ffffff; --bg-head: #ffffff;
            --text: #1a202c; --text-sec: #4a5568; --border: #cbd5e0;
            --bubble-ai: #e2e8f0; --input-bg: #edf2f7;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text); overflow: hidden; }
        header { height: 60px; background: var(--bg-head); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); }
        .body-layout { display: flex; height: calc(100vh - 60px); overflow: hidden; }
        .sidebar-left { width: 280px; background: var(--bg-side); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
        .center-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow-y: auto; position: relative; overflow-x: hidden; }
        .sidebar-right { width: 320px; background: var(--bg-side); border-left: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }
        
        #drop-zone { border: 2px dashed var(--border); padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; margin-bottom: 20px; }
        .paper-card { background: var(--input-bg); padding: 10px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .toolbar { height: 50px; background: var(--bg-head); display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        #pdf-container { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px; }
        canvas { box-shadow: 0 4px 6px rgba(0,0,0,0.3); background: white; }
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text-sec); }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 14px; }
        .ai-bubble { align-self: flex-start; background: var(--bubble-ai); }
        .user-bubble { align-self: flex-end; background: var(--accent); color: white; }
        
        input, button { border-radius: 8px; border: 1px solid var(--border); padding: 8px; background: var(--input-bg); color: var(--text); }
        button:hover { cursor: pointer; opacity: 0.8; }
        .btn-accent { background: var(--accent); color: white; border: none; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 10px 20px; border-radius: 8px; display: none; z-index: 100; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg-side); padding: 20px; width: 100%; height: 100%; border-radius: 0; position: relative; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<header id="header">
    <div style="color:var(--accent); font-weight:bold; font-size: 20px;">🧠 InsightLM</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key">
        <div id="status-dot" style="width:10px; height:10px; border-radius:50%; background:red;"></div>
        <button onclick="toggleTheme()">🌓</button>
    </div>
</header>

<div class="body-layout">
    <div class="sidebar-left">
        <div id="drop-zone">Drop PDF here<br>or click to browse</div>
        <input type="file" id="file-input" hidden accept=".pdf" multiple>
        <h3>Document Library</h3>
        <div id="library-list"></div>
    </div>
    <div class="center-panel" id="center-panel">
        <div id="empty-state" class="empty-state">
            <div style="font-size: 48px; margin-bottom: 10px;">📖</div>
            <h3>No Research Document Loaded</h3>
            <button class="btn-accent" style="margin-top: 15px;" onclick="document.getElementById('file-input').click()">Browse PDFs</button>
        </div>
        <div class="toolbar" id="toolbar" style="display:none;">
            <div id="scroll-indicator" style="font-size: 12px;">Viewing Page 1 of 0</div>
            <button onclick="changeZoom(-0.1)">-</button>
            <button onclick="changeZoom(0.1)">+</button>
        </div>
        <div id="pdf-container"></div>
    </div>
    <div class="sidebar-right">
        <div style="padding:15px; flex-shrink:0;">
            <h3>Research Copilot</h3>
            <button class="btn-accent" style="width:100%; margin-bottom:5px;" onclick="handleAction('Summarize this paper: ')">📝 Summarize Paper</button>
            <button class="btn-accent" style="width:100%; margin-bottom:5px;" onclick="handleAction('What are the key findings of this paper: ')">🔍 Key Findings</button>
            <button class="btn-accent" style="width:100%; margin-bottom:5px;" onclick="handleAction('Generate a mindmap structure for: ', true)">🧠 Generate Mindmap</button>
            <button class="btn-accent" style="width:100%;" onclick="handleAction('Draft a professional email summary of this research for a manager: ')">✨ Draft Report</button>
        </div>
        <div class="chat-area" id="chat"></div>
        <div style="display: flex; gap: 8px; padding: 12px; flex-shrink: 0;">
            <input type="text" id="chat-input" style="flex:1" placeholder="Ask question...">
            <button class="btn-accent" style="width: 60px;" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<div id="mindmap-modal" class="modal">
    <div class="modal-content">
        <button style="position: absolute; top: 10px; right: 10px; z-index:10;" onclick="document.getElementById('mindmap-modal').style.display='none'">X</button>
        <h2 id="modal-title" style="margin:10px;">Mindmap</h2>
        <div id="modal-body" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <canvas id="mindmap-canvas" width="900" height="600" style="width: 90%; height: 80%; border: 1px solid var(--border);"></canvas>
        </div>
        <div id="presentation-area" style="padding:20px; display:none;"></div>
        <div style="padding:20px; display:flex; gap:10px;">
            <button class="btn-accent" onclick="createPresentation()">Create Presentation</button>
            <button class="btn-accent" id="back-btn" style="display:none;" onclick="renderMindmap(lastData)">Back to Mindmap</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const initPdf = () => { if (typeof pdfjsLib !== 'undefined') pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; };
    initPdf();

    let papers = {}, currentPaper = null, presentation = null, slideIdx = 0, lastData = null;

    document.getElementById('apiKeyInput').addEventListener('input', function() {
        localStorage.setItem('geminiApiKey', this.value);
        document.getElementById('status-dot').style.background = this.value ? 'green' : 'red';
    });

    window.onload = () => {
        const key = localStorage.getItem('geminiApiKey') || '';
        document.getElementById('apiKeyInput').value = key;
        document.getElementById('status-dot').style.background = key ? 'green' : 'red';
    };

    document.getElementById('file-input').onchange = e => handleFiles(e.target.files);

    async function handleFiles(files) {
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const pdf = await pdfjsLib.getDocument(e.target.result).promise;
                papers[file.name] = { pdf, fullText: '' };
                for(let i=1; i<=pdf.numPages; i++) {
                    const t = await (await pdf.getPage(i)).getTextContent();
                    papers[file.name].fullText += t.items.map(item => item.str).join(' ') + ' ';
                }
                const div = document.createElement('div'); div.className = 'paper-card';
                div.innerHTML = `<span>${file.name.substring(0, 15)}</span> <button onclick="selectPaper('${file.name}')">Open</button>`;
                document.getElementById('library-list').appendChild(div);
            };
            reader.readAsArrayBuffer(file);
        }
    }

    function selectPaper(name) {
        currentPaper = papers[name]; currentPaper.name = name;
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('toolbar').style.display = 'flex';
        document.getElementById('scroll-indicator').innerText = `Viewing Page 1 of ${currentPaper.pdf.numPages}`;
        renderAllPages();
    }

    async function handleAction(prompt, isMindmap = false) {
        const apiKey = localStorage.getItem('geminiApiKey');
        if (!apiKey) return alert("Please enter your Gemini API key in the header");
        if (!currentPaper) return alert("No PDF loaded");
        
        const chat = document.getElementById('chat');
        const bubble = document.createElement('div'); bubble.className = 'bubble ai-bubble'; bubble.innerText = "Processing..."; chat.appendChild(bubble);
        
        try {
            const promptText = prompt + currentPaper.fullText.substring(0, 5000);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });
            const data = await response.json();
            if (data.error) throw new Error("API Error: " + data.error.message);
            const result = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!result) throw new Error("No text found in response");
            
            bubble.innerText = result;
            if (isMindmap) {
                lastData = JSON.parse(result.replace(/```json/g, '').replace(/```/g, '').trim());
                document.getElementById('mindmap-modal').style.display = 'flex';
                renderMindmap(lastData);
            }
        } catch(e) { bubble.innerText = "Error: " + e.message; }
    }

    async function renderAllPages() {
        const container = document.getElementById('pdf-container'); container.innerHTML = '';
        for(let i=1; i<=currentPaper.pdf.numPages; i++) {
            const canvas = document.createElement('canvas'); container.appendChild(canvas);
            const page = await currentPaper.pdf.getPage(i);
            const vp = page.getViewport({ scale: 1 });
            canvas.height = vp.height; canvas.width = vp.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        }
    }

    function renderMindmap(data) {
        document.getElementById('modal-body').style.display = 'flex';
        document.getElementById('presentation-area').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        const c = document.getElementById('mindmap-canvas'), ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        const cx = 450, cy = 300;
        if(data.children) {
            data.children.forEach((child, i) => {
                const angle = (i / data.children.length) * Math.PI * 2;
                const x = cx + 240 * Math.cos(angle), y = cy + 240 * Math.sin(angle);
                ctx.strokeStyle = '#555'; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
                ctx.fillStyle = '#1e2235'; ctx.beginPath(); ctx.arc(x, y, 45, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.textAlign = 'center';
                ctx.fillText(child.label.length > 18 ? child.label.substring(0, 18) + '...' : child.label, x, y+3);
            });
        }
        ctx.fillStyle = '#B31B1B'; ctx.beginPath(); ctx.arc(cx, cy, 55, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'white'; ctx.fillText(data.title.substring(0, 18), cx, cy+4);
    }

    async function createPresentation() {
        const apiKey = localStorage.getItem('geminiApiKey');
        const promptText = `Create a 5-slide presentation for this document: ${currentPaper.fullText.substring(0, 3000)}. Return ONLY JSON: {"slides":[{"title":"Slide Title","bullets":["point 1","point 2","point 3"]}]}`;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        const data = await response.json();
        const result = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (result) {
            presentation = JSON.parse(result.replace(/```json/g, '').replace(/```/g, '').trim());
            slideIdx = 0; renderSlide();
        }
    }

    function renderSlide() {
        document.getElementById('modal-body').style.display = 'none';
        document.getElementById('presentation-area').style.display = 'block';
        document.getElementById('back-btn').style.display = 'block';
        const s = presentation.slides[slideIdx];
        document.getElementById('presentation-area').innerHTML = `<h3>Slide ${slideIdx + 1} of 5</h3><h1>${s.title}</h1><ul>${s.bullets.map(b=>`<li>${b}</li>`).join('')}</ul><button onclick="slideIdx=Math.max(0,slideIdx-1); renderSlide()">Prev</button><button onclick="slideIdx=Math.min(presentation.slides.length-1,slideIdx+1); renderSlide()">Next</button>`;
    }

    async function ask(msg) {
        const apiKey = localStorage.getItem('geminiApiKey');
        const chat = document.getElementById('chat');
        const bubble = document.createElement('div'); bubble.className = 'bubble ai-bubble'; bubble.innerText = "Thinking..."; chat.appendChild(bubble);
        
        // Add "Explain Concept" intelligence:
        const contextMsg = msg.toLowerCase().includes('explain') ? 
                           `Context: ${currentPaper ? currentPaper.fullText.substring(0, 3000) : ''}. Based strictly on the provided context, explain the following term in simple terms: ${msg}` :
                           `${currentPaper ? 'Context: ' + currentPaper.fullText.substring(0, 5000) : ''} User: ${msg}`;
        
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: contextMsg }] }] })
            });
            const d = await resp.json();
            if (d.error) throw new Error("API Error: " + d.error.message);
            const text = d?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) bubble.innerText = text;
            else throw new Error("No text found");
        } catch(e) { bubble.innerText = "Error: " + e.message; }
    }

    function sendMessage() { ask(document.getElementById('chat-input').value); document.getElementById('chat-input').value = ''; }
    function toggleTheme() { document.body.classList.toggle('light'); }
</script>
</body>
</html>
